<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Graph — AlgoVis</title>

  <!-- CSS LINK -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <a class="back-link" href="../index.html">← back</a>
  <span class="header-label">// graph visualizer</span>
  <span class="header-brand">algovis</span>
</header>

<div class="workspace">

  <!-- LEFT PANEL -->
  <div class="panel">

    <div>
      <div class="panel-section-label">Algorithm</div>
      <div class="algo-list">
        <button class="algo-btn active" data-algo="bfs">BFS</button>
        <button class="algo-btn" data-algo="dfs">DFS</button>
        <button class="algo-btn" data-algo="dijkstra">Dijkstra</button>
      </div>
    </div>

    <div>
      <div class="panel-section-label">Graph Type</div>
      <div class="toggle-row">
        <button class="toggle-btn active" id="btn-undirected">Undirected</button>
        <button class="toggle-btn" id="btn-directed">Directed</button>
      </div>
    </div>

    <div>
      <div class="panel-section-label">Edit Mode</div>
      <div class="mode-list">
        <button class="mode-btn active" data-mode="node">Add Node</button>
        <button class="mode-btn" data-mode="edge">Add Edge</button>
        <button class="mode-btn" data-mode="start">Set Start</button>
        <button class="mode-btn" data-mode="end">Set End</button>
        <button class="mode-btn" data-mode="delete">Delete</button>
      </div>
    </div>

    <div>
      <div class="panel-section-label">Speed</div>
      <input type="range" id="speed" min="10" max="1000" value="50" step="10"/>
    </div>

    <div class="action-row">
      <button class="btn primary" id="btn-run">Run</button>
      <button class="btn" id="btn-reset-vis">Reset</button>
      <button class="btn" id="btn-clear">Clear</button>
      <button class="btn" id="btn-sample">Sample</button>
    </div>

  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap">
    <canvas id="graph-canvas"></canvas>
  </div>

</div>

<!-- JS LINK -->
<script src="script.js"></script>

</body>
</html>
