<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph — AlgoVis</title>

  <!-- LINK CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <a class="back-link" href="../index.html">← back</a>
  <span class="header-label">// graph visualizer</span>
  <span class="header-brand">algovis</span>
</header>

<div class="workspace">

  <!-- ── LEFT PANEL ── -->
  <div class="panel">

    <div>
      <div class="panel-section-label">Algorithm</div>
      <div class="algo-list">
        <button class="algo-btn active" data-algo="bfs">BFS</button>
        <button class="algo-btn" data-algo="dfs">DFS</button>
        <button class="algo-btn" data-algo="dijkstra">Dijkstra</button>
      </div>
    </div>

    <div>
      <div class="panel-section-label">Graph Type</div>
      <div class="toggle-row">
        <button class="toggle-btn active" id="btn-undirected">Undirected</button>
        <button class="toggle-btn" id="btn-directed">Directed</button>
      </div>
    </div>

    <div>
      <div class="panel-section-label">Edit Mode</div>
      <div class="mode-list">
        <button class="mode-btn active" data-mode="node"><span class="mode-dot"></span>Add Node</button>
        <button class="mode-btn" data-mode="edge"><span class="mode-dot"></span>Add Edge</button>
        <button class="mode-btn" data-mode="start"><span class="mode-dot"></span>Set Start</button>
        <button class="mode-btn" data-mode="end"><span class="mode-dot"></span>Set End</button>
        <button class="mode-btn" data-mode="delete"><span class="mode-dot"></span>Delete</button>
      </div>
    </div>

    <div>
      <div class="panel-section-label">Speed — <span id="speed-label">50ms</span></div>
      <input type="range" id="speed" min="10" max="1000" value="50" step="10" />
    </div>

    <div class="action-row">
      <button class="btn primary" id="btn-run">▶ Run</button>
      <button class="btn" id="btn-reset-vis">↺ Reset Vis</button>
      <button class="btn" id="btn-clear">⊘ Clear Graph</button>
      <button class="btn" id="btn-sample">⊞ Load Sample</button>
    </div>

  </div>

  <!-- ── CANVAS ── -->
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="graph-canvas"></canvas>
    <div class="canvas-hint" id="canvas-hint">Click canvas to add nodes · Switch to "Add Edge" to connect them</div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="panel panel-right">
    <!-- KEEP EVERYTHING SAME (no change) -->
  </div>

</div>

<!-- LINK JS -->
<script src="script.js"></script>

</body>
</html>
